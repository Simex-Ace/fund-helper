name: 每日信号更新

on:
  schedule:
    # 交易日 9:00 UTC+8 → 1:00 UTC（周一至周五）
    - cron: '0 1 * * 1-5'
  workflow_dispatch:  # 支持手动触发

jobs:
  generate-signals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 运行信号生成器
        run: node scripts/signal-generator.js

      - name: 提交更新
        run: |
          git config user.name "fund-helper-bot"
          git config user.email "bot@fund-helper"
          git add public/index.html
          git diff --quiet && git diff --staged --quiet || \
            (git commit -m "🤖 每日信号自动更新 $(date +'%Y-%m-%d')" && git push)
